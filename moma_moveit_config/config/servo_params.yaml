# MoveIt Servo configuration for the UR10e arm on the MoMa mobile manipulator.
#
# This file is loaded as raw YAML by demo.launch.py and wrapped in the
# "moveit_servo" namespace before being passed to servo_node_main.  That
# matches the parameter path Humble's ServoParameters::makeServoParameters()
# expects (it declares everything under the "moveit_servo" sub-namespace).
# Do NOT add a "/**:" or node-name wrapper here.

use_gazebo: false

## Incoming commands
# "speed_units" → velocities in the JointJog message are in rad/s.
command_in_type: "speed_units"
scale:
  linear: 0.3
  rotational: 0.5
  joint: 0.5

## Outgoing commands
publish_period: 0.034
low_latency_mode: false
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false

## Smoothing
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## Planning scene
# move_group (from moma_nav_moveit.launch.py) is the primary scene monitor.
is_primary_planning_scene_monitor: false

## MoveIt properties
move_group_name: ur_manipulator
planning_frame: ur_base_link
ee_frame_name: ur_tool0
robot_link_command_frame: ur_base_link

## Stopping behaviour
incoming_command_timeout: 0.1
num_outgoing_halt_msgs_to_publish: 4

## Singularity and joint limit handling
lower_singularity_threshold: 17.0
hard_stop_singularity_threshold: 30.0
joint_limit_margin: 0.1
leaving_singularity_threshold_multiplier: 2.0

## Topics
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /joint_trajectory_controller/joint_trajectory

## Collision checking
check_collisions: true
collision_check_rate: 10.0
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
