ur_manipulator:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  # KDL is seed-dependent; allow multiple random restarts before declaring IK failure.
  # Without this, a bad seed (stale planning scene state after trajectory execution)
  # causes OMPL to get zero goal samples → 5-second planning timeout.
  kinematics_solver_attempts: 5