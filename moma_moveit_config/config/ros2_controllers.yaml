controller_manager:
  ros__parameters:
    update_rate: 100

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0  # explicit rate; default ties to controller_manager update_rate

joint_trajectory_controller:
  ros__parameters:
    # Continue each new trajectory from the LAST COMMANDED state instead of the
    # measured joint state. lock_on_arm_node already integrates a smooth,
    # monotonic q_desired and streams 1-point trajectories at 50 Hz; closed-loop
    # mode re-anchored every spline to the lagging /joint_states, breaking the
    # (Δp, v_end, dt) consistency and producing jagged, boosted velocity.
    # Open-loop chains the splines (spline[k] starts where spline[k-1] ended),
    # giving a flat constant-velocity command. See docs/jtc_open_loop_explained.md.
    open_loop_control: true
    joints:
      - ur_shoulder_pan_joint
      - ur_shoulder_lift_joint
      - ur_elbow_joint
      - ur_wrist_1_joint
      - ur_wrist_2_joint
      - ur_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Diagnostic: publish controller_state at the full controller_manager
    # rate so we can resolve every control cycle (default is 50 Hz).
    state_publish_rate: 100.0
