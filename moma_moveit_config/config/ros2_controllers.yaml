controller_manager:
  ros__parameters:
    update_rate: 100

    ur_manipulator_controller:
      type: joint_trajectory_controller/JointTrajectoryController   # was ScaledJointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0  # explicit rate; default ties to controller_manager update_rate

ur_manipulator_controller:
  ros__parameters:
    joints:
      - ur_shoulder_pan_joint
      - ur_shoulder_lift_joint
      - ur_elbow_joint
      - ur_wrist_1_joint
      - ur_wrist_2_joint
      - ur_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Diagnostic: publish controller_state at the full controller_manager
    # rate so we can resolve every control cycle (default is 50 Hz).
    state_publish_rate: 100.0
