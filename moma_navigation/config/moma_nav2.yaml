amcl:
  ros__parameters:
    use_sim_time: true
    
    # --- Frame IDs & Topics (Your Setup) ---
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    odom_topic: /odometry/filtered
    scan_topic: "/scan"
    
    # --- Initial Pose ---
    # Since you have set_initial_pose to true, you must provide the coordinates,
    # otherwise AMCL might throw warnings or default to 0,0,0 anyway.
    set_initial_pose: true
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0} 
    
    # Dropping the values mean we trust the Odom reading more.
    robot_model_type: "nav2_amcl::DifferentialMotionModel" # Use "nav2_amcl::OmnidirectionalMotionModel" if mecanum
    # alpha1: 0.05 # Was 0.2
    # alpha2: 0.05 # Was 0.2
    # alpha3: 0.10 # Was 0.2
    # alpha4: 0.05 # Was 0.2
    # alpha5: 0.05 # Was 0.2 (Note: alpha5 is ONLY used if you set Omnidirectional above)

    alpha1: 0.2 
    alpha2: 0.2 
    alpha3: 0.2 
    alpha4: 0.2
    
    # Dropping the max particles can reduce the load on your CPU
    min_particles: 500
    max_particles: 2000 
    update_min_d: 0.20 # Update AMCL every 20cm
    update_min_a: 0.20 # Update AMCL every ~11 degrees
    pf_err: 0.05
    pf_z: 0.99
    
    laser_min_range: 0.50  # Ignore the box and the UR10e base
    laser_max_range: 10.0  # Ignore "dust" or long-range noise

    laser_model_type: "likelihood_field" 
    laser_max_beams: 60 # Look at 144 points per scan instead of the default 60
    laser_z_hit: 0.90 # probability that the laser actually hit a mapped wall (90%)
    laser_z_short: 0.05 # probability that the laser hit an unmapped dynamic obstacles
    laser_z_max: 0.05 # probability that the laser saw nth and returned a "max range" error
    laser_z_rand: 0.05 # probability of pure sensor noise or phantom reflections
    laser_likelihood_max_dist: 2.0 # max dist for likelihood of a mapped wall
    # laser_max_range: 5.0  # Force AMCL to ignore anything further than your map's range
    save_pose_rate: 10.0      # Increased from default
    transform_tolerance: 5.0 # Increased to handle simulation jitter

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# Responsible for generating the actual velocity commands (cmd_vel) to follow the path generated by the global planner
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0 #previously 20, dropped for the other topics to be published in time
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: "/odometry/filtered"
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    # FollowPath:
    #   plugin: "dwb_core::DWBLocalPlanner" # MPPI is also recommended, but it requires a beefy CPU, we should check it out, should also check RPP
    #   debug_trajectory_details: True
    #   min_vel_x: 0.0
    #   min_vel_y: 0.0
    #   max_vel_x: 0.5
    #   max_vel_y: 0.0
    #   max_vel_theta: 0.5
    #   min_speed_xy: 0.0
    #   max_speed_xy: 0.5
    #   min_speed_theta: 0.0
    #   acc_lim_x: 1.0
    #   acc_lim_y: 0.0
    #   acc_lim_theta: 1.2
    #   decel_lim_x: -0.8
    #   decel_lim_y: 0.0
    #   decel_lim_theta: -1.2
    #   vx_samples: 20
    #   vy_samples: 5
    #   vtheta_samples: 20
    #   sim_time: 1.7
    #   linear_granularity: 0.05
    #   angular_granularity: 0.025
    #   transform_tolerance: 0.2
    #   xy_goal_tolerance: 0.15
    #   yaw_goal_tolerance: 0.15
    #   stateful: True
      
    #   # Critics are the "Judges" that score the simulated trajectories
    #   critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "PathDist", "GoalDist"]
      
    #   BaseObstacle: 
    #     scale: 0.02 # Keep this low enough to allow movement but high enough to repel
      
    #   PathDist: 
    #     scale: 32.0 # High scale tells the robot: "Stay near the points of the line"
        
    #   GoalDist: 
    #     scale: 24.0 # Keep moving toward the end of the line
        
    #   RotateToGoal: 
    #     scale: 32.0
    #     slowing_factor: 5.0
    #     lookahead_time: -1.0 # This ensures it only starts spinning at the very end
      
    #   Oscillation:
    #     scale: 1.0

    #   # prune_plan: true
    #   # prune_distance: 0.5 # Automatically toss out parts of the path we've already passed.

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.1
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.15
      transform_tolerance: 2.0
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: true
      allow_reversing: false

    # FollowPath:
    #   plugin: "dwb_core::DWBLocalPlanner"
      
    #   # --- Velocity Limits ---
    #   min_vel_x: 0.0
    #   min_vel_y: 0.0
    #   max_vel_x: 0.4
    #   max_vel_y: 0.0
    #   max_vel_theta: 0.5
    #   min_speed_xy: 0.0
    #   max_speed_xy: 0.4
    #   min_speed_theta: 0.0
      
    #   # --- Acceleration Limits (match velocity_smoother) ---
    #   acc_lim_x: 0.7
    #   acc_lim_theta: 0.7
    #   decel_lim_x: -0.8
    #   decel_lim_theta: -1.2
      
    #   # --- Trajectory Sampling ---
    #   vx_samples: 15
    #   vy_samples: 1         # 1 for diff-drive, never change this
    #   vtheta_samples: 20
    #   sim_time: 2.0         # look further ahead than default 1.7
    #   linear_granularity: 0.05
    #   angular_granularity: 0.025
    #   transform_tolerance: 0.2
    #   xy_goal_tolerance: 0.25
    #   yaw_goal_tolerance: 0.25
    #   stateful: True
    #   prune_plan: true
    #   prune_distance: 1.0   # discard path points already passed

    #   # --- Critics ---
    #   # RotateToGoal deliberately excluded — this is what caused the spin loops
    #   critics: ["Oscillation", "BaseObstacle", "PathDist", "GoalDist"]

    #   BaseObstacle:
    #     scale: 0.02

    #   PathDist:
    #     scale: 8.0

    #   GoalDist:
    #     scale: 20.0

    #   Oscillation:
    #     scale: 4.0          # was 1.0 — actively punishes back-and-forth

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 2.0 
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: true
      # a 4 x 4 meter rolling window
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[ [0.55, 0.35], [-0.45, 0.35], [-0.45, -0.35], [0.55, -0.35] ]" #fr-le corner, re-le corner, re-ri corner, fr-ri corner  
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # observation_sources: scan
        # scan:
        #   topic: /scan
        #   max_obstacle_height: 2.0
        #   clearing: True
        #   marking: True
        #   data_type: "LaserScan"
        observation_sources: scan_front scan_back
        
        scan_front:
          topic: /f_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          
        scan_back:
          topic: /b_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # how "scared" the robot is of walls and obstacles, the higher the value, the more daring the robot is
        inflation_radius: 0.4 # in meters

global_costmap:
  global_costmap:
    ros__parameters:
      transform_tolerance: 2.0 #
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      footprint: "[ [0.55, 0.35], [-0.45, 0.35], [-0.45, -0.35], [0.55, -0.35] ]" #fr-le corner, re-le corner, re-ri corner, fr-ri corner  
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # observation_sources: scan
        # scan:
        #   topic: /scan
        #   max_obstacle_height: 2.0
        #   clearing: True
        #   marking: True
        #   data_type: "LaserScan"
        observation_sources: scan_front scan_back
        scan_front:
          topic: /f_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True   
          data_type: "LaserScan"

        scan_back:
          topic: /b_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer: # should be identical as the local costmap's inflation layer
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # how "scared" the robot is of walls and obstacles, the higher the value, the more daring the robot is
        inflation_radius: 0.4 # in meters

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner" # can check out smac planners that use a highly optimized A* aglorithm
      tolerance: 0.5
      use_astar: false # if astar is false, it is dijkstra
      allow_unknown: true

# smoothen out any jagged edges or sharp corners the path creates
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["SimpleSmoother"]
    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      max_rotational_vel: 0.2    # Drastically slow down the spin (radians/sec)
      min_rotational_vel: 0.1
      rotational_accel: 0.2      # Ramp up speed very gently
      simulate_ahead_time: 2.0   # Force it to look 2 seconds ahead for collisions!
      is_stuck: false
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 2.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered # use /odom with the real robot
    bt_loop_duration: 100
    default_server_timeout: 20

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false

velocity_smoother:
  ros__parameters:
    use_sim_time: true # Make sure this is false for real hardware!
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.1, 0.0, 0.1]
    min_velocity: [-0.05, 0.0, -0.1] # Slowed down reversing
    max_accel: [0.15, 0.0, 0.15]     # Gentle acceleration
    max_decel: [-0.2, 0.0, -0.2]     # Gentle braking to protect the UR10e
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
