# moma_gazebo/config/ros_gz_bridge.yaml
---
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# MiR joints — wheels, casters, etc. (come from Gazebo physics directly)
- ros_topic_name: "/joint_states"
  gz_topic_name: "/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Drive commands (ROS -> Gazebo)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# Odometry: published by the OdometryPublisher gazebo plugin (in moma.urdf.xacro)
# on the gz topic "odom_gt" — physics-derived ground truth. Bridged into ROS as
# /odom so it matches the real-hardware topic name (MiR driver publishes /odom).
# The diff_drive plugin's wheel-encoder gz topic /odom is intentionally NOT
# bridged: it reports commanded velocity, which lies under wall contact.
- ros_topic_name: "/odom"
  gz_topic_name: "/odom_gt"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Add the Front and Back Lasers
- ros_topic_name: "/f_scan"
  gz_topic_name: "/f_scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/b_scan"
  gz_topic_name: "/b_scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# IMU data (Gazebo -> ROS)
- ros_topic_name: "/imu"
  gz_topic_name: "/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS